<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 窗口切换</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        margin: 0;
        padding: 12px;
        min-width: 260px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .qf-title {
        font-size: 14px;
        font-weight: 650;
        margin: 0 0 10px;
      }
      .qf-sub {
        font-size: 12px;
        opacity: 0.75;
        margin: 0 0 12px;
        line-height: 1.45;
      }
      .qf-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: min(60vh, 320px);
        overflow-y: auto;
      }
      .qf-btn {
        padding: 8px 10px;
        cursor: pointer;
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
        background: color-mix(in srgb, Canvas 96%, CanvasText 4%);
        font-size: 13px;
        text-align: left;
      }
      .qf-btn:hover {
        filter: brightness(1.04);
      }
      .qf-hint {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        opacity: 0.75;
      }
      .qf-foot {
        margin-top: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .qf-link {
        font-size: 12px;
        cursor: pointer;
        color: var(--accent, #2563eb);
        text-decoration: underline;
        background: none;
        border: none;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <h1 class="qf-title">AI 窗口切换</h1>
    <p class="qf-sub">点击在已绑定的 AI 窗口间切换。本窗口可常驻，关闭即退出。</p>
    <div id="switcher-targets" class="qf-list" aria-live="polite"></div>
    <div class="qf-foot">
      <button type="button" class="qf-link" id="switcher-refresh">刷新列表</button>
      <button type="button" class="qf-link" id="switcher-open-controller">打开控制器</button>
    </div>
    <script src="quick-focus.js"></script>
    <script src="switcher.js"></script>
  </body>
</html>
