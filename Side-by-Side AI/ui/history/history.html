<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>会话历史 - Side-by-Side AI</title>
    <link rel="stylesheet" href="../../assets/styles.css" />
    <link rel="stylesheet" href="../controller/controller.css" />
  </head>
  <body class="controller-page">
    <header class="controller-header">
      <h1 class="controller-title">会话历史</h1>
      <p class="controller-sub">
        本地 <code>oa_history</code>。在<strong>常驻输入条</strong>里点时钟图标会向上展开列表，点一条即可让已绑定的各站点标签页跳转到当时保存的 URL。本页可管理或从链接在新标签打开。
      </p>
    </header>
    <section class="controller-section" aria-label="历史列表">
      <div class="controller-toolbar" role="toolbar">
        <button type="button" class="btn btn-ghost" id="history-back">返回控制器</button>
        <button type="button" class="btn btn-ghost" id="history-clear">清空历史</button>
        <button type="button" class="btn btn-ghost" id="history-refresh">刷新</button>
      </div>
      <p id="history-status" class="controller-send-status" role="status" aria-live="polite"></p>
      <ul id="history-list" class="history-list"></ul>
    </section>
    <script src="../../assets/quick-focus.js"></script>
    <script src="history.js"></script>
  </body>
</html>
