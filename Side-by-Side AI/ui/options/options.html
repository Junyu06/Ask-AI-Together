<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Side-by-Side AI - 选项</title>
    <link rel="stylesheet" href="../../assets/styles.css" />
    <link rel="stylesheet" href="../controller/controller.css" />
    <link rel="stylesheet" href="options.css" />
  </head>
  <body class="options-page">
    <div id="panel-backdrop" class="panel-backdrop hidden" aria-hidden="true"></div>

    <section id="input-bubble" class="bubble bubble-input opt-bubble" aria-label="输入与操作">
      <p id="send-status" class="send-status hidden" role="status" aria-live="polite"></p>
      <div class="input-row input-row-minimal">
        <div class="prompt-wrap">
          <label for="prompt" class="visually-hidden" data-i18n="prompt_label">输入问题</label>
          <textarea
            id="prompt"
            name="prompt"
            autocomplete="off"
            placeholder="输入问题；回车发送（Shift+Enter 换行）"
            rows="1"
            aria-label="输入问题"
            data-i18n-placeholder="prompt_placeholder"
            data-i18n-aria-label="prompt_label"
          ></textarea>
        </div>
        <button id="send" class="btn btn-icon btn-primary btn-send" type="button" aria-label="发送" title="发送" data-i18n-aria-label="send" data-i18n-title="send">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.4" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6v12" /><path d="m7.5 10.5 4.5-4.5 4.5 4.5" /></svg>
        </button>
      </div>
    </section>

    <aside id="right-panel" class="right-panel hidden" role="dialog" aria-modal="true" aria-labelledby="panel-title">
      <div class="panel-head">
        <h2 id="panel-title" data-i18n="settings_title">设置</h2>
        <button id="panel-close" class="btn btn-icon btn-ghost" type="button" aria-label="关闭" title="关闭" data-i18n-aria-label="close" data-i18n-title="close">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
        </button>
      </div>
      <div class="panel-body">
        <nav class="settings-sidebar" aria-label="设置类别">
          <button class="sidebar-item active" data-settings-tab="sites" type="button" data-i18n="sites_tab">站点</button>
          <button class="sidebar-item" data-settings-tab="windows" type="button" data-i18n="window_layout_title">窗口</button>
          <button class="sidebar-item" data-settings-tab="appearance" type="button" data-i18n="appearance_tab">外观</button>
          <button class="sidebar-item" data-settings-tab="language" type="button" data-i18n="language_mode">语言</button>
        </nav>
        <section id="settings-content" class="settings-content">
          <div id="settings-tab-sites" class="settings-tab active" data-tab="sites">
            <p class="floating-window-subtitle" data-i18n="sites_subtitle">选择哪些站点会参与发送和打开窗口。</p>
            <ul id="sw-site-list" class="controller-site-list"></ul>
          </div>

          <div id="settings-tab-windows" class="settings-tab" data-tab="windows">
            <p class="floating-window-subtitle" data-i18n="windows_subtitle">这里只保留多窗口 workflow 相关配置和动作。</p>
            <div class="controller-field">
              <label class="controller-field-label" for="sw-window-mode" data-i18n="window_mode_label">新窗口外观</label>
              <select id="sw-window-mode" class="controller-select">
                <option value="minimal" data-i18n="window_mode_minimal">极简（无标签栏）</option>
                <option value="normal" data-i18n="window_mode_normal">标准（完整窗口）</option>
              </select>
              <p class="controller-hint" data-i18n="window_mode_hint">仅影响新打开或拆分出来的窗口。</p>
            </div>
            <div class="controller-field">
              <label class="controller-field-label" for="sw-layout-preset" data-i18n="layout_label">窗口排列</label>
              <select id="sw-layout-preset" class="controller-select">
                <option value="auto" data-i18n="layout_auto">自动</option>
                <option value="horizontal" data-i18n="layout_horizontal">横排均分</option>
                <option value="vertical" data-i18n="layout_vertical">竖排均分</option>
                <option value="focus-left" data-i18n="layout_focus_left">主窗在左，其余竖排</option>
                <option value="focus-top" data-i18n="layout_focus_top">主窗在上，其余横排</option>
                <option value="two-top-one-bottom" data-i18n="layout_two_top_one_bottom">三窗：上二下一</option>
                <option value="one-left-two-right" data-i18n="layout_one_left_two_right">三窗：左一右二</option>
                <option value="grid-2x2" data-i18n="layout_grid_2x2">四窗：2×2</option>
              </select>
            </div>
            <div class="controller-toolbar" role="toolbar">
              <button type="button" class="btn btn-primary" id="sw-open-windows" data-i18n="open_windows">打开 / 复用窗口</button>
              <button type="button" class="btn btn-ghost" id="sw-tile" data-i18n="tile">平铺</button>
              <button type="button" class="btn btn-ghost" id="sw-retile" data-i18n="retile">重排</button>
              <button type="button" class="btn btn-ghost" id="sw-focus" data-i18n="focus_first">聚焦首个</button>
              <button type="button" class="btn btn-ghost" id="sw-close" data-i18n="close_all_targets">关闭全部已开窗口</button>
              <button type="button" class="btn btn-ghost" id="sw-refresh" data-i18n="refresh_state">刷新状态</button>
            </div>
            <div id="sw-target-status" class="controller-target-status" role="status"></div>
            <p id="sw-panel-status" class="controller-send-status" role="status" aria-live="polite"></p>
          </div>

          <div id="settings-tab-appearance" class="settings-tab" data-tab="appearance">
            <p class="floating-window-subtitle" data-i18n="appearance_subtitle">只保留主题，不再把别的杂项塞进设置。</p>
            <div class="theme-options">
              <label class="theme-option">
                <input type="radio" name="theme-mode" value="system" />
                <span data-i18n="theme_system">跟随系统</span>
              </label>
              <label class="theme-option">
                <input type="radio" name="theme-mode" value="light" />
                <span data-i18n="theme_light">浅色</span>
              </label>
              <label class="theme-option">
                <input type="radio" name="theme-mode" value="dark" />
                <span data-i18n="theme_dark">深色</span>
              </label>
            </div>
          </div>

          <div id="settings-tab-language" class="settings-tab" data-tab="language">
            <p class="floating-window-subtitle" data-i18n="language_subtitle">界面语言只保留 auto / 中文 / English。</p>
            <div class="theme-options">
              <label class="theme-option">
                <input type="radio" name="locale-mode" value="auto" />
                <span data-i18n="language_auto">跟随浏览器</span>
              </label>
              <label class="theme-option">
                <input type="radio" name="locale-mode" value="zh" />
                <span data-i18n="language_zh">中文</span>
              </label>
              <label class="theme-option">
                <input type="radio" name="locale-mode" value="en" />
                <span data-i18n="language_en">English</span>
              </label>
            </div>
          </div>
        </section>
      </div>
    </aside>

    <aside id="history-panel" class="right-panel hidden" role="dialog" aria-modal="true" aria-labelledby="history-title">
      <div class="panel-head">
        <h2 id="history-title" data-i18n="history_title">历史</h2>
        <div class="panel-head-actions">
          <button id="history-clear-all" class="btn btn-ghost" type="button" data-i18n="clear">清空</button>
          <button id="history-close" class="btn btn-icon btn-ghost" type="button" aria-label="关闭" title="关闭" data-i18n-aria-label="close" data-i18n-title="close">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>
      </div>
      <div class="history-panel-body">
        <p class="floating-window-subtitle" data-i18n="history_subtitle">点击历史中的站点链接可回到对应页面。</p>
        <ul id="history-list" class="history-list-opt"></ul>
      </div>
    </aside>

    <script src="../../assets/options-i18n.js"></script>
    <script src="../../assets/quick-focus.js"></script>
    <script src="../../assets/options-settings.js"></script>
    <script src="options.js"></script>
  </body>
</html>
