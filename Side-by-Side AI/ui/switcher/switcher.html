<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>常驻输入条 - Side-by-Side AI</title>
    <link rel="stylesheet" href="../../assets/styles.css" />
    <style>
      body.switcher-page {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column-reverse;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        overflow: hidden;
      }
      .skip-link {
        position: fixed;
        top: 6px;
        left: 6px;
        z-index: 20;
        font-size: 11px;
      }
      .switcher-top {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        padding: 8px 12px 4px;
        gap: 6px;
      }
      .switcher-top-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }
      .switcher-title {
        font-size: 13px;
        font-weight: 650;
        margin: 0;
      }
      .switcher-sub {
        font-size: 11px;
        opacity: 0.72;
        margin: 4px 0 0;
        line-height: 1.4;
      }
      .switcher-top-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: flex-end;
        flex-shrink: 0;
      }
      .switcher-link {
        font-size: 12px;
        cursor: pointer;
        color: var(--accent, #2563eb);
        text-decoration: underline;
        background: none;
        border: none;
        padding: 0;
      }
      #switcher-targets {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-content: flex-start;
        overflow: auto;
        min-height: 32px;
      }
      #switcher-targets .qf-btn.qf-chip {
        padding: 5px 11px;
        cursor: pointer;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
        background: color-mix(in srgb, Canvas 96%, CanvasText 4%);
        font-size: 12px;
        white-space: nowrap;
      }
      #switcher-targets .qf-btn.qf-chip:hover {
        filter: brightness(1.04);
      }
      .qf-hint {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        opacity: 0.75;
      }
      /* 与 index 相同的 input-bubble，在本窗口内贴底、全宽（非 position:fixed 居中） */
      body.switcher-page .bubble.switcher-bubble {
        position: relative;
        left: 0;
        bottom: 0;
        transform: none;
        width: 100%;
        max-width: none;
        min-width: 0;
        flex-shrink: 0;
        z-index: 1;
        padding: 0 10px 10px;
        box-sizing: border-box;
      }
      body.switcher-page .bubble.switcher-bubble::before {
        display: none;
      }
      body.switcher-page .bubble.switcher-bubble .drag-ring {
        display: none;
      }

      #history-panel {
        flex-shrink: 0;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
        border-top: 1px solid color-mix(in srgb, currentColor 12%, transparent);
        background: color-mix(in srgb, Canvas 97%, CanvasText 3%);
      }
      body.switcher-page.history-panel-open #history-panel {
        max-height: 280px;
      }
      .history-panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 6px 10px 4px;
        font-size: 11px;
        font-weight: 600;
        opacity: 0.85;
      }
      .history-panel-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .history-panel-actions .switcher-link {
        font-size: 11px;
      }
      #history-panel-list {
        list-style: none;
        margin: 0;
        padding: 4px 8px 10px;
        max-height: 220px;
        overflow-y: auto;
      }
      .history-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 10px;
        margin-bottom: 6px;
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, currentColor 14%, transparent);
        background: color-mix(in srgb, Canvas 98%, CanvasText 2%);
        box-sizing: border-box;
      }
      .history-row-body {
        flex: 1;
        min-width: 0;
        text-align: left;
      }
      .history-row-body.is-clickable {
        cursor: pointer;
      }
      .history-row-body.is-clickable:hover {
        filter: brightness(0.98);
      }
      .history-row-prompt {
        font-size: 12px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .history-row-meta {
        font-size: 10px;
        opacity: 0.65;
        margin-top: 4px;
      }
      .history-row-del {
        flex-shrink: 0;
        margin-top: 2px;
        padding: 2px 6px;
        font-size: 11px;
        cursor: pointer;
        border: none;
        background: transparent;
        color: var(--accent, #2563eb);
        text-decoration: underline;
      }
      .history-empty {
        padding: 12px 10px;
        font-size: 12px;
        opacity: 0.75;
      }
      .switcher-pip-banner {
        margin: 0 10px 6px;
        padding: 6px 8px;
        font-size: 11px;
        line-height: 1.35;
        border-radius: 8px;
        background: color-mix(in srgb, var(--accent, #2563eb) 12%, transparent);
        border: 1px solid color-mix(in srgb, var(--accent, #2563eb) 28%, transparent);
      }
      #switcher-pip-top.switcher-pip-primary {
        font-weight: 650;
        text-decoration: none;
        padding: 4px 8px;
        border-radius: 8px;
        background: color-mix(in srgb, var(--accent, #2563eb) 18%, transparent);
      }
    </style>
  </head>
  <body class="switcher-page">
    <a href="#prompt" class="skip-link">跳过到输入框</a>

    <!-- column-reverse：DOM 顺序为 底栏 → 历史 → 顶栏，历史从输入条向上展开 -->
    <!-- 与旧版分屏页相同的 #input-bubble 结构（id/class 共用 styles.css） -->
    <section id="input-bubble" class="bubble bubble-input switcher-bubble" aria-label="输入与操作">
      <p id="send-status" class="send-status hidden" role="status" aria-live="polite"></p>
      <div class="input-row">
        <div class="left-actions" aria-label="工具栏">
          <button id="site-settings-btn" class="btn btn-icon btn-ghost" type="button" aria-label="设置" title="设置">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button id="history-btn" class="btn btn-icon btn-ghost" type="button" aria-label="历史记录" title="展开/收起发送历史" aria-expanded="false">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /></svg>
          </button>
          <button id="combine-latest" class="btn btn-icon btn-ghost btn-summary" type="button" aria-label="汇总最新回复" title="汇总最新回复">
            <svg class="icon icon-summary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.9" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 4.5c1.4 2.9 2.1 3.6 5 5-2.9 1.4-3.6 2.1-5 5-1.4-2.9-2.1-3.6-5-5 2.9-1.4 3.6-2.1 5-5Z"/>
              <path d="M18.4 14.6c.6 1.2.9 1.5 2.1 2.1-1.2.6-1.5.9-2.1 2.1-.6-1.2-.9-1.5-2.1-2.1 1.2-.6 1.5-.9 2.1-2.1Z"/>
              <path d="M6 15.8c.5 1 .8 1.2 1.8 1.8-1 .5-1.3.8-1.8 1.8-.5-1-.8-1.3-1.8-1.8 1-.5 1.3-.8 1.8-1.8Z"/>
            </svg>
            <span class="visually-hidden">汇总最新回复</span>
          </button>
          <button id="new-chat" class="btn btn-ghost btn-new-chat" type="button" aria-label="新对话" title="新对话">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
            <span>新聊天</span>
          </button>
        </div>
        <div class="prompt-wrap">
          <div id="attachment-chips" class="attachment-chips hidden" aria-label="已添加附件"></div>
          <div id="mention-chips" class="mention-chips hidden" aria-label="已选择站点"></div>
          <label for="prompt" class="visually-hidden">输入问题</label>
          <textarea
            id="prompt"
            name="prompt"
            autocomplete="off"
            placeholder="输入问题，@ 单独 AI，# 放大 AI；回车发送（Shift+Enter 换行）"
            rows="1"
            aria-label="输入问题"
          ></textarea>
          <div id="mention-dropdown" class="mention-dropdown hidden" aria-hidden="true"></div>
        </div>
        <button id="send" class="btn btn-icon btn-primary btn-send" type="button" aria-label="发送" title="发送">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.4" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6v12" /><path d="m7.5 10.5 4.5-4.5 4.5 4.5" /></svg>
        </button>
      </div>
      <div class="drag-ring" aria-hidden="true"></div>
    </section>

    <div id="history-panel" class="history-panel" aria-hidden="true">
      <div class="history-panel-head">
        <span>发送历史（点击一条恢复各站点到当时页面）</span>
        <div class="history-panel-actions">
          <button type="button" class="switcher-link" id="history-open-fullpage">完整页面</button>
          <button type="button" class="switcher-link" id="history-panel-close">收起</button>
        </div>
      </div>
      <ul id="history-panel-list"></ul>
    </div>

    <div class="switcher-top">
      <div class="switcher-top-head">
        <div>
          <h1 class="switcher-title">常驻漂浮输入</h1>
          <p class="switcher-sub">
            发送目标为控制器里勾选的站点。「置顶」在 macOS 上请用右上角 <strong>画中画置顶</strong>（系统级浮窗）；普通窗口的 alwaysOnTop 可能无效。
          </p>
          <p class="switcher-pip-banner" id="switcher-pip-hint" hidden>
            需要真正置顶？请点击上方 <strong>画中画置顶</strong>（本窗口可关闭）。
          </p>
        </div>
        <div class="switcher-top-actions">
          <button type="button" class="switcher-link" id="switcher-embed-close" hidden>关闭侧栏</button>
          <button type="button" class="switcher-link" id="switcher-refresh">刷新列表</button>
          <button type="button" class="switcher-link" id="switcher-open-controller">控制器</button>
          <button
            type="button"
            class="switcher-link switcher-pip-primary"
            id="switcher-pip-top"
            title="在画中画窗口打开，可系统级置顶（macOS 推荐）"
          >
            画中画置顶
          </button>
        </div>
      </div>
      <div id="switcher-targets" aria-live="polite"></div>
    </div>

    <script src="../../assets/quick-focus.js"></script>
    <script src="../../assets/switcher-pip.js"></script>
    <script src="switcher.js"></script>
  </body>
</html>
