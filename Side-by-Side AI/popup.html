<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ask AI Together</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        margin: 0;
        padding: 12px;
        min-width: 280px;
        max-width: 360px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .popup-section-title {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        opacity: 0.65;
        margin: 0 0 8px;
      }
      .popup-targets {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 14px;
        max-height: 220px;
        overflow-y: auto;
      }
      .popup-targets .qf-btn {
        padding: 8px 10px;
        cursor: pointer;
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
        background: color-mix(in srgb, Canvas 96%, CanvasText 4%);
        font-size: 13px;
        text-align: left;
      }
      .popup-targets .qf-btn:hover {
        filter: brightness(1.04);
      }
      .popup-hint {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        opacity: 0.75;
      }
      .qf-hint {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        opacity: 0.75;
      }
      .popup-actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-top: 4px;
        border-top: 1px solid color-mix(in srgb, currentColor 12%, transparent);
      }
      .popup-actions button {
        padding: 10px 12px;
        cursor: pointer;
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
        background: color-mix(in srgb, Canvas 96%, CanvasText 4%);
        font-size: 14px;
      }
      .popup-actions button:hover {
        filter: brightness(1.03);
      }
    </style>
  </head>
  <body>
    <div class="popup-section-title">快速聚焦已绑定的 AI 窗口</div>
    <div id="popup-targets" class="popup-targets" aria-live="polite"></div>

    <div class="popup-actions">
      <button type="button" id="open-switcher">打开常驻切换器（小窗）</button>
      <button type="button" id="open-controller">打开多窗口控制器</button>
      <button type="button" id="open-split">打开分屏视图（iframe）</button>
    </div>
    <script src="quick-focus.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
